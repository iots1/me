    <!-- Use Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Set Monospace Font for Terminal Realism */
      @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap");

      body {
        font-family: "Fira Code", monospace;
        background-color: #0d1117; /* GitHub Dark Dimmed Background */
        color: #c9d1d9;
        /* Prevent scrollbars during animations */
        overflow-x: hidden;
      }

      /* Custom Scrollbar to match the theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0d1117;
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #8b949e;
      }

      /* Animation for blinking cursor */
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Specific colors for simulated Syntax Highlighting */
      .cmd-prompt {
        color: #7ee787;
      } /* Green */
      .cmd-dir {
        color: #79c0ff;
      } /* Blue */
      .cmd-input {
        color: #f2cc60;
      } /* Yellow */
      .json-key {
        color: #79c0ff;
      }
      .json-string {
        color: #a5d6ff;
      }
      .json-number {
        color: #f2cc60;
      }
      .comment {
        color: #8b949e;
        font-style: italic;
      }
      .link-hover {
        transition: all 0.2s ease-in-out;
        text-decoration: underline;
        text-decoration-color: #79c0ff;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
        text-shadow: 0 0 5px rgba(121, 192, 255, 0.6);
      }
      .link-hover:hover {
        color: #58a6ff;
        text-decoration-color: #58a6ff;
        text-shadow:
          0 0 8px #58a6ff,
          0 0 15px #58a6ff;
      }

      /* Matrix Canvas */
      #matrix-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        pointer-events: none;
        display: none;
        background: black;
      }

      /* Draggable Header Cursor */
      .draggable-header {
        cursor: grab;
      }
      .draggable-header:active {
        cursor: grabbing;
      }
    </style>
  </head>

              ></path>

            scrolling="0"

        </div>
      </div>

       __ ___________  ___   __  ____  __
      / // /  _/ __ \/ _ | / / / / / / / 
   __/ // // // /_/ / __ |/ /_/ / /_/ /  
  /___/___/___/ .___/_/ |_|\____/\____/

            autofocus
            autocomplete="off"
            spellcheck="false"
          />
        </div>

    </div>

      </div>

      function simulateBootProcess() {
        const logsContainer = document.getElementById("boot-logs");
        const loadingScreen = document.getElementById("loading-screen");
        const loadingCursor = document.getElementById("loading-cursor");
        let msgIndex = 0;

        function printNextBootMessage() {
          if (msgIndex < bootMessages.length) {
            const msgDiv = document.createElement("div");
            msgDiv.innerHTML = bootMessages[msgIndex];
            logsContainer.appendChild(msgDiv);

            // Auto scroll down during boot
            loadingScreen.scrollTop = loadingScreen.scrollHeight;

            // Add realistic delay for boot process
            let delay = Math.random() * 120 + 80; // Random between 80ms and 200ms

            // Make specific steps slower to simulate actual data loading
            if (msgIndex > 0) {
              const prevMsg = bootMessages[msgIndex - 1];
              if (prevMsg.includes("Loading Linux Kernel")) delay = 600;
              else if (prevMsg.includes("Mounting")) delay = 800;
              else if (prevMsg.includes("Starting Graphical Interface"))
                delay = 500;
            }

            msgIndex++;
            setTimeout(printNextBootMessage, delay);
          } else {
            // Finished loading messages, show cursor briefly, then fade out
            loadingCursor.classList.remove("hidden");

            setTimeout(() => {
              loadingScreen.classList.add("opacity-0"); // Tailwind fade out

              // Wait for fade out to complete before removing from flow
              setTimeout(() => {
                loadingScreen.style.display = "none";
                // START MAIN TERMINAL TYPING EFFECT
                setTimeout(typeWriter, 300);
              }, 500);
            }, 800);
          }
        }

        // Start booting
        setTimeout(printNextBootMessage, 200);

        if (isBootFinished) return;

          charIndex++;
          setTimeout(typeWriter, Math.random() * 50 + 50); // Random typing speed

      terminalHeader.addEventListener("mousedown", dragStart);
      document.addEventListener("mouseup", dragEnd);

      terminalHeader.addEventListener("touchstart", dragStart, {
        passive: false,
      });
      document.addEventListener("touchend", dragEnd);
      document.addEventListener("touchmove", drag, { passive: false });

      function dragStart(e) {
        if (e.type === "touchstart") {
          initialX = e.touches[0].clientX - xOffset;
          initialY = e.touches[0].clientY - yOffset;
        } else {
          initialX = e.clientX - xOffset;
          initialY = e.clientY - yOffset;
        }
        if (
          e.target === terminalHeader ||
          e.target.parentNode === terminalHeader
        ) {
          isDragging = true;
        }
      }

      function dragEnd() {
        initialX = currentX;
        initialY = currentY;
        isDragging = false;
      }

      function drag(e) {
        if (isDragging) {
          e.preventDefault();
          if (e.type === "touchmove") {
            currentX = e.touches[0].clientX - initialX;
            currentY = e.touches[0].clientY - initialY;
          } else {
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
          }
          xOffset = currentX;
          yOffset = currentY;
          setTranslate(currentX, currentY, terminalWindow);

            outputDiv.innerHTML = `/home/${CONFIG.promptUser}/portfolio`;
            break;

          case "date":
            outputDiv.innerHTML = new Date().toString();
            break;

          case "history":
            outputDiv.className =
              "mt-2 mb-4 pl-4 text-[#8b949e] font-mono text-sm";
            outputDiv.innerHTML = commandHistory
              .map(
                (c, i) =>
                  `<div><span class="text-[#c9d1d9] inline-block w-8 text-right mr-4">${i + 1}</span>${c}</div>`,
              )
              .join("");
            break;

          case "neofetch":
          case "fastfetch":
            outputDiv.className = "mt-4 mb-6 pl-4";
            outputDiv.innerHTML = getNeofetchTemplate();
            break;

          case "reboot":
          case "shutdown":
            outputDiv.className = "mt-2 mb-4 pl-4 text-[#f2cc60]";
            outputDiv.innerHTML = `System going down for ${lowerCmd} NOW!`;
            cliOutputContainer.appendChild(outputDiv);
            setTimeout(() => window.location.reload(), 1000);
            return;

          case "exit":
            outputDiv.innerHTML = `Logging out... Restarting session...`;
            cliOutputContainer.appendChild(outputDiv);
            setTimeout(() => window.location.reload(), 800);
            return;

          // Handle commands with prefixes (like 'sudo ...' or 'cowsay ...')
          default:
            if (lowerCmd.startsWith("sudo")) {
              outputDiv.className = "mt-2 mb-4 pl-4 text-[#ff7b72]";
              outputDiv.innerHTML = `${CONFIG.promptUser} is not in the sudoers file. This incident will be reported. 🚨`;
            } else if (lowerCmd.startsWith("cd")) {
              outputDiv.className = "mt-2 mb-4 pl-4 text-[#ff7b72]";
              outputDiv.innerHTML = `bash: cd: Permission denied. You are trapped in my portfolio! 🚪🔒`;
            } else if (lowerCmd.startsWith("cowsay")) {
              let msg = cmd.substring(6).trim();
              if (!msg) msg = "Moo! Welcome to my portfolio!";
              outputDiv.className = "mt-2 mb-4 pl-4 text-[#c9d1d9]";
              outputDiv.innerHTML = getCowsayTemplate(msg);
            } else {
              outputDiv.innerHTML = `bash: ${cmd}: command not found. Type 'help' for available commands.`;
            }
            break;
        }

        // Append the output div if it has content
        if (outputDiv.innerHTML !== "") {
          cliOutputContainer.appendChild(outputDiv);
        }
      }

      // --- Matrix Digital Rain ---
      let matrixInterval;
      function startMatrix() {
        const canvas = document.getElementById("matrix-canvas");
        const ctx = canvas.getContext("2d");

        canvas.style.display = "block";
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana =
          "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン";
        const latin = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const nums = "0123456789";
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
          drops[x] = 1;
        }

        if (matrixInterval) clearInterval(matrixInterval);

        const draw = () => {
          ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = "#0F0";
          ctx.font = fontSize + "px monospace";

          for (let i = 0; i < drops.length; i++) {
            const text = alphabet.charAt(
              Math.floor(Math.random() * alphabet.length),
            );
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
              drops[i] = 0;
            }
            drops[i]++;
          }
        };

        matrixInterval = setInterval(draw, 33);

        // Stop matrix on click or any key press
        const stopMatrix = () => {
          clearInterval(matrixInterval);
          canvas.style.display = "none";
          document.removeEventListener("keydown", stopMatrix);
          document.removeEventListener("mousedown", stopMatrix);
        };

        // Short delay to prevent immediate closing
        setTimeout(() => {
          document.addEventListener("keydown", stopMatrix);
          document.addEventListener("mousedown", stopMatrix);
        }, 500);
      }
    </script>
  </body>
