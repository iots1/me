<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thumbnail Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap");

      body {
        font-family: "Fira Code", monospace;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      /* Fixed size for standard Social Media Open Graph image */
      .thumbnail-container {
        width: 1200px;
        height: 630px;
        background-color: #0d1117;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      }

      /* Glowing Background Effect */
      .glow-bg {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 800px;
        height: 800px;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(46, 160, 67, 0.15) 0%,
          rgba(13, 17, 23, 0) 70%
        );
        z-index: 0;
      }

      .cursor-blink {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- 1200x630 px Container for Screenshot -->
    <div class="thumbnail-container">
      <!-- Glow Effect -->
      <div class="glow-bg"></div>

      <!-- Terminal Window -->
      <div
        class="z-10 w-[1000px] bg-[#161b22] border border-[#30363d] rounded-2xl shadow-2xl flex flex-col overflow-hidden"
      >
        <!-- Terminal Header -->
        <div
          class="bg-[#010409] px-6 py-5 flex items-center border-b border-[#30363d]"
        >
          <div class="flex gap-3">
            <div class="w-4 h-4 rounded-full bg-[#ff5f56]"></div>
            <div class="w-4 h-4 rounded-full bg-[#ffbd2e]"></div>
            <div class="w-4 h-4 rounded-full bg-[#27c93f]"></div>
          </div>
          <div
            class="flex-1 text-center text-[#8b949e] font-medium text-xl tracking-wider"
          >
            jirayu@backend-node: ~/portfolio
          </div>
        </div>

        <!-- Terminal Body -->
        <div class="p-10 pl-12 text-[#c9d1d9]">
          <!-- Command Line -->
          <div class="text-2xl mb-8">
            <span class="text-[#7ee787]">guest@system</span>:<span
              class="text-[#79c0ff]"
              >~/portfolio</span
            >$ <span class="text-[#f2cc60]">./deploy_profile.sh</span>
          </div>

          <!-- Profile Info -->
          <div class="pl-8 border-l-4 border-[#30363d] mb-12 py-2">
            <h1 class="text-6xl font-bold text-white mb-6 tracking-tight">
              Jirayu Mool-ang
            </h1>
            <h2 class="text-3xl text-[#ff7b72]">> Senior Backend Developer</h2>
          </div>

          <!-- Skill Tags -->
          <div class="flex flex-wrap gap-4 mb-10">
            <span
              class="px-5 py-2.5 bg-[#2ea043]/10 text-[#7ee787] border border-[#2ea043]/50 rounded-lg text-xl font-semibold"
              >NestJS</span
            >
            <span
              class="px-5 py-2.5 bg-[#2ea043]/10 text-[#7ee787] border border-[#2ea043]/50 rounded-lg text-xl font-semibold"
              >Golang</span
            >
            <span
              class="px-5 py-2.5 bg-[#388bfd]/10 text-[#79c0ff] border border-[#388bfd]/50 rounded-lg text-xl font-semibold"
              >Kubernetes</span
            >
            <span
              class="px-5 py-2.5 bg-[#388bfd]/10 text-[#79c0ff] border border-[#388bfd]/50 rounded-lg text-xl font-semibold"
              >Docker</span
            >
            <span
              class="px-5 py-2.5 bg-[#d29922]/10 text-[#e3b341] border border-[#d29922]/50 rounded-lg text-xl font-semibold"
              >AI & RAG</span
            >
          </div>

          <!-- Prompt End -->
          <div class="text-2xl mt-4 flex items-center">
            <span class="text-[#7ee787]">guest@system</span>:<span
              class="text-[#79c0ff]"
              >~/portfolio</span
            >$
            <span
              class="cursor-blink bg-gray-400 w-4 h-8 inline-block ml-3"
            ></span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
